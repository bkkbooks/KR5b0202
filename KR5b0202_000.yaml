front:
  text: 玉籙大齋第一日午朝儀
  hash: sha256:ae97f1287f1a46e2a496c47f82ca4b9e55de06e33376d3cef5e789c7eee023e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0202_HFL_000-001a, image: hfl/0269/0269-050.png}
body:
  text: 各禮師存念如法謡歌空洞帝君守壇五帝校録受符三官備衛四門束魔去姦流鈴擲火隂穢焚殘身佩金書鍊液芝顔玄靈素合心動三關騎獅跨鶴控龍乘鸞萬星守舍千魔不干道氣長存萬仙悉安發爐如前請稱法位具位與臨壇官衆等謹同誠上啓虛元自然元始天尊無極大道太上道君太上老君髙上玉皇十方巳得道大聖衆至真諸君丈人三十二天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶瓊臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師上相上宰上保上傳太平下教二十四真人西城惣真王君太乙真人東嶽上卿司命茅君定録保命二真人名山洞府得道神仙三界官屬一切真靈臣聞二景含虛隱華靈於未兆九霄總梵合妙氣於自然象帝之先寂寥獨立太初而上恍惚無名混三色以玄通凝一神而生化分無上玉虛之氣鬱結洞章肇太無赤混之元周回梵行無文不度至極難超臣等憑藉福因參聞玄妙披九光之祕藴窺盻靈章宣三洞之明科遵行教典凡有所啓敢不上聞齋意青詞謹當宣奏具如詞言不違懇欵恩惟大道分别請祈臣聞虛元空碧玄丘顯雲篆之文太漠流輝梵行露天真之旨扶搖一氣騰育九清臣等視晷精修過中不昧回風芳耀衝絳闕以揚輝奔日赤精當丹天而正照羽蓋流精於黃道玉華散景於玄壇恭假香傳奉修齋直以今第一日中分行道請法衆等運兹初捻上香願此香煙騰空徑上供養虛無至真自然大道元始天尊願以是捻香功德上祝當今皇帝嗣曆無疆伏願統接千齡道侔二帝鴻圖天固永垂億萬世之基龜鼎日隆逺邁八百年之卜握真符而御極膺曆數以在躬運撫靈長功光祖述休祥畢至瑞慶大來今故燒香自皈依道尊大聖衆至真之德得道之後保天長存臣聞紫精朗郁三廬生空寂之神瓊室流輝十合轉金橋之聖妙穖倒影大混飛玄以今第一日中分行道請法衆等運兹二捻上香願此香煙騰空徑上供養玉晨至聖自然靈寶大道天尊願以是捻香功德上資國母皇后神儀伏願鍊質東華陶魂南極飛升金闕徑陪髙上之班遊宴玉京位正元真之陛流祥帝祚延𥙿皇圖金枝玉葉以彌芳紫鳳青鸞而薦瑞九州清泰四海晏安今故燒香自皈依經尊大聖衆至真之德得道之後升入無形臣聞鑿開混沌分圓清方濁之殊位定髙卑有人世天關之别紫虛鬱秀玉精流光以今第一日臨午行道請法衆等運兹三捻上香願此香煙騰空徑上供養混元大聖自然道德天尊願以是捻香功德上資宗祧先聖所薦神儀伏願天地開光太虛感會熙夷養素宴息處於黃房空碧練真徑躋登於紫極垂祥宗廟延福儲宫今故燒香自皈依師尊大聖衆至真之德得道之後升入無形懴悔旋繞命魔步虛禮經三啓重稱法位具位與臨壇官衆等謹同誠上啓三清至尊十方上聖玉京金闕天帝天真十方師尊聖衆三界官屬一切威靈臣聞洞玄出經天地設恭而稽首神霄告籙幽冥開道以通關臣等夙預真儔叨承道蔭所宜守黃庭而偃息內養神形餐素液以耽研外除嗜欲恭承上命恪為典行伏望道意昭融宸𠂻鑑念頒玉清之寶籙金液鍊形授金闕之瓊篇丹臺校録上祝坤宫殿下神儀執握龍章御登鳯輦徑入清虛之境飛升太漠之鄉位列真仙名刋紫册宴瑶池而泛景居蘂闕以怡神證道無為超登有在上明天尊大慈之化下副臣等請命之誠謹啓以聞十二願一願天恩普降二願符命遐宣三願玄壇警肅四願萬聖臨軒五願千真朝仰六願萬氣齊仙七願回尸起死八願度品南宫九願天清氣朗十願河海晏然十一願輪轉得道十二願飛升上清復爐同前出堂謝師回幕玉籙大齋第一日午朝儀
